services:
  evolution-api:
    image: atendai/evolution-api:v1.8.7
    container_name: evolution-api
    restart: always
    ports:
      - "8081:8080"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      # Autenticação
      AUTHENTICATION_TYPE: "apikey"
      AUTHENTICATION_API_KEY: "FinanceDigital_EvoKey_2025"
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"

      # Configurações gerais
      SERVER_URL: "http://localhost:8081"
      CONFIG_SESSION_PHONE_CLIENT: "Evolution API"
      CONFIG_SESSION_PHONE_NAME: "Chrome"

      # Banco de dados — MongoDB
      DATABASE_ENABLED: "true"
      DATABASE_CONNECTION_URI: "mongodb://root:evo_mongo_2025@evolution-mongo:27017/evolution?authSource=admin"
      DATABASE_CONNECTION_DB_PREFIX_NAME: "evo"
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"

      # Webhooks globais
      WEBHOOK_GLOBAL_ENABLED: "false"
      WEBHOOK_GLOBAL_URL: ""

      # QR Code
      QRCODE_LIMIT: 30
      QRCODE_COLOR: "#198754"

      # Log
      LOG_LEVEL: "ERROR,WARN,DEBUG,INFO,LOG,VERBOSE,DARK,WEBHOOKS"
      LOG_BAILEYS: "error"

      # Instâncias
      DEL_INSTANCE: "false"
      DEL_TEMP_INSTANCES: "false"

      # Cache local (sem Redis)
      CACHE_REDIS_ENABLED: "false"
      CACHE_REDIS_URI: ""
      CACHE_LOCAL_ENABLED: "true"
    volumes:
      - evolution_data:/evolution/instances
      - evolution_store:/evolution/store
    depends_on:
      evolution-mongo:
        condition: service_healthy

  evolution-mongo:
    image: mongo:7
    container_name: evolution-mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: "root"
      MONGO_INITDB_ROOT_PASSWORD: "evo_mongo_2025"
    ports:
      - "27018:27017"
    volumes:
      - evolution_mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  evolution_data:
  evolution_store:
  evolution_mongodata:
